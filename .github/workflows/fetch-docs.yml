name: Fetch Slack Developer Docs

on:
  workflow_dispatch:
  schedule:
    # 03:00 JST = 18:00 UTC
    - cron: "0 18 * * *"

jobs:
  fetch:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - name: Set timestamp
        id: timestamp
        run: echo "value=$(date -u +'%Y%m%d-%H%M')" >> "$GITHUB_OUTPUT"

      - name: Show timestamp (placeholder)
        run: echo "Run timestamp (UTC) = ${{ steps.timestamp.outputs.value }}"

      - name: Install uv
        uses: astral-sh/setup-uv@v3

      - name: Install dependencies
        run: uv sync

      - name: Run fetcher
        env:
          BASE_TIMESTAMP: ${{ steps.timestamp.outputs.value }}
          PYTHONPATH: src
        run: uv run src/handlers/fetcher.py
