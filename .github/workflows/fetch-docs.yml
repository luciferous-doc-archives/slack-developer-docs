name: Fetch Slack Developer Docs

on:
  workflow_dispatch:
  schedule:
    # 03:00 JST = 18:00 UTC
    - cron: "0 18 * * *"

jobs:
  fetch:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - name: Set timestamp
        id: timestamp
        run: echo "value=$(date -u +'%Y%m%d-%H%M')" >> "$GITHUB_OUTPUT"

      - name: Set date
        id: date
        run: echo "value=$(date -u +'%Y/%m/%d')" >> "$GITHUB_OUTPUT"

      - name: Show timestamp (placeholder)
        run: echo "Run timestamp (UTC) = ${{ steps.timestamp.outputs.value }}"

      - name: Install uv
        uses: astral-sh/setup-uv@08807647e7069bb48b6ef5acd8ec9567f424441b # v8.1.0

      - name: Install dependencies
        run: uv sync

      - name: Run fetcher
        env:
          BASE_TIMESTAMP: ${{ steps.timestamp.outputs.value }}
          PYTHONPATH: src
        run: uv run src/handlers/fetcher/fetcher.py

      - name: Generate file hashes
        working-directory: docs/slack-developer-docs-${{ steps.timestamp.outputs.value }}
        run: find . -type f | sort | xargs sha256sum > ../../current_file_hashes.txt

      - name: Compare hashes
        id: compare
        run: |
          if diff -q file_hashes.txt current_file_hashes.txt >/dev/null 2>&1; then
            echo "files_changed=false" >> "$GITHUB_OUTPUT"
            echo "Files are identical. No update needed."
          else
            echo "files_changed=true" >> "$GITHUB_OUTPUT"
            echo "Files have changed. Proceeding with update."
          fi

      - name: Create release zip
        if: steps.compare.outputs.files_changed == 'true'
        run: |
          mkdir -p dist
          cd docs
          zip -r -9 ../dist/slack-developer-docs-${{ steps.timestamp.outputs.value }}.zip slack-developer-docs-${{ steps.timestamp.outputs.value }}/

      - name: Update file hashes
        if: steps.compare.outputs.files_changed == 'true'
        run: |
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git config --global user.name "github-actions[bot]"
          cp current_file_hashes.txt file_hashes.txt
          git add file_hashes.txt
          git commit -m "Update file hashes for docs updated on ${{ steps.timestamp.outputs.value }}"
          git push origin ${{ github.ref_name }}

      - name: Create GitHub Release
        if: steps.compare.outputs.files_changed == 'true'
        uses: softprops/action-gh-release@3bb12739c298aeb8a4eeaf626c5b8d85266b0e65 # v2
        with:
          tag_name: v${{ steps.timestamp.outputs.value }}
          name: ${{ steps.date.outputs.value }} document updated
          body: |
            Document updated on ${{ steps.date.outputs.value }} (${{ steps.timestamp.outputs.value }})
          draft: false
          files: dist/*.zip

  notify-on-failure:
    runs-on: ubuntu-latest
    needs: fetch
    if: failure()
    steps:
      - name: Notify Slack on failure
        env:
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_INCOMING_WEBHOOK_URL }}
          WORKFLOW_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
          REPO_URL: ${{ github.server_url }}/${{ github.repository }}
          REPO_NAME: ${{ github.repository }}
        run: |
          PAYLOAD=$(printf '{"text":"<!channel> GitHub Actions workflow failed: Fetch Slack Developer Docs","blocks":[{"type":"section","text":{"type":"mrkdwn","text":"*Failed to fetch Slack Developer Docs*\n\nRepository: <%s|%s>\n\n<%s|View Details>"}}]}' "$REPO_URL" "$REPO_NAME" "$WORKFLOW_URL")
          curl -X POST "$SLACK_WEBHOOK_URL" \
            -H 'Content-Type: application/json' \
            -d "$PAYLOAD"
